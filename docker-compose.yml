services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: manycat
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/manycat
      NODE_ENV: production
      AGENT_HARNESS_URL: http://agent:8000
      SANDBOX_ORCHESTRATOR_URL: http://orchestrator:8080
      NEXT_PUBLIC_SANDBOX_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy
      agent:
        condition: service_started
      orchestrator:
        condition: service_started

  agent:
    build:
      context: ./agent-harness
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      MODEL: ${MODEL:-gpt-4o}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      WORKSPACE_ROOT: /workspace
    volumes:
      - manycat_workspaces:/workspace

  orchestrator:
    build:
      context: ./infra/sandbox-orchestrator
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PREVIEW_HOST: localhost
      SANDBOX_IMAGE: manycat-sandbox:latest
      WORKSPACE_ROOT: /workspace
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - manycat_workspaces:/workspace

volumes:
  postgres_data:
  manycat_workspaces:
