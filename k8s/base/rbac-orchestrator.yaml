apiVersion: v1
kind: ServiceAccount
metadata:
  name: sandbox-orchestrator
  namespace: manycat
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sandbox-orchestrator
  namespace: manycat
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sandbox-orchestrator
  namespace: manycat
subjects:
  - kind: ServiceAccount
    name: sandbox-orchestrator
    namespace: manycat
roleRef:
  kind: Role
  name: sandbox-orchestrator
  apiGroup: rbac.authorization.k8s.io
