apiVersion: v1
kind: ConfigMap
metadata:
  name: sandbox-job-template
  namespace: manycat
data:
  job.yaml: |
    apiVersion: batch/v1
    kind: Job
    metadata:
      name: sandbox-WORKFLOW_ID
      namespace: manycat
    spec:
      ttlSecondsAfterFinished: 3600
      activeDeadlineSeconds: 7200
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: sandbox
              image: manycat-sandbox:latest
              imagePullPolicy: IfNotPresent
              ports:
                - containerPort: 3000
              env:
                - name: PORT
                  value: "3000"
              volumeMounts:
                - name: workspace
                  mountPath: /workspace
                  subPath: WORKFLOW_ID
          volumes:
            - name: workspace
              persistentVolumeClaim:
                claimName: manycat-workspaces
